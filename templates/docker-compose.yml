# Docker Compose for local development
#
# Profiles:
#   dev      - Claude Code dev environment
#   db       - PostgreSQL
#   runtime  - Django + Gunicorn + Nginx (production-like)
#   logging  - Loki + Grafana
#
# Usage:
#   docker compose build base && docker compose build
#   docker compose --profile dev run --rm claude-dev
#   docker compose --profile db up -d
#   docker compose --profile runtime up -d
#   docker compose --profile logging up -d
#   docker compose down

services:
  # ─────────────────────────────────────────────────────────────
  # Base Python Image (build-only, no runtime service)
  # ─────────────────────────────────────────────────────────────
  base:
    build:
      context: ./docker-setup/base
    image: ${COMPOSE_PROJECT_NAME:-myproject}-base:latest
    profiles:
      - build

  # ─────────────────────────────────────────────────────────────
  # Claude Code Development Environment
  # ─────────────────────────────────────────────────────────────
  claude-dev:
    build:
      context: ./docker-setup/claude-dev
      args:
        BASE_IMAGE: ${COMPOSE_PROJECT_NAME:-myproject}-base:latest
    image: ${COMPOSE_PROJECT_NAME:-myproject}-claude-dev:latest
    container_name: ${COMPOSE_PROJECT_NAME:-myproject}-claude-dev

    profiles:
      - dev

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=1G
      - /run:mode=1777,size=64M

    volumes:
      - .:/workspace:rw
      - devuser-home:/home/devuser:rw

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GIT_USER_NAME=${GIT_USER_NAME:-}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}

    stdin_open: true
    tty: true

    networks:
      - dev-network

    depends_on:
      postgres:
        condition: service_healthy
        required: false

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-myproject}-postgres

    profiles:
      - db

    volumes:
      - postgres-data:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-devuser}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-devpass}
      POSTGRES_DB: ${DATABASE_NAME:-devdb}

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_READ_SEARCH
    security_opt:
      - no-new-privileges:true

    networks:
      - dev-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-devuser} -d ${DATABASE_NAME:-devdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Django Runtime (production-like)
  # ─────────────────────────────────────────────────────────────
  django-runtime:
    build:
      context: .
      dockerfile: docker-setup/django-runtime/Dockerfile
      args:
        BASE_IMAGE: ${COMPOSE_PROJECT_NAME:-myproject}-base:latest
    image: ${COMPOSE_PROJECT_NAME:-myproject}-runtime:latest
    container_name: ${COMPOSE_PROJECT_NAME:-myproject}-runtime

    profiles:
      - runtime

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=256M

    environment:
      - DATABASE_NAME
      - DATABASE_USERNAME
      - DATABASE_PASSWORD
      - DATABASE_PORT
      - DJANGO_SETTINGS_MODULE
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY
      - ENVIRONMENT
      - GUNICORN_WSGI_MODULE
      - LOKI_URL

    volumes:
      - static-files:/workspace/staticfiles:rw
      - media-files:/workspace/media:rw

    expose:
      - "8000"

    networks:
      - dev-network

    depends_on:
      postgres:
        condition: service_healthy
        required: false
      loki:
        condition: service_started
        required: false

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # Nginx - Reverse proxy and static files
  # ─────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker-setup/nginx
    image: ${COMPOSE_PROJECT_NAME:-myproject}-nginx:latest
    container_name: ${COMPOSE_PROJECT_NAME:-myproject}-nginx

    profiles:
      - runtime

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=1777,size=64M,uid=101,gid=101
      - /var/run:mode=1777,size=64M
      - /tmp:mode=1777,size=64M

    volumes:
      - static-files:/workspace/staticfiles:ro
      - media-files:/workspace/media:ro

    ports:
      - "80:80"

    networks:
      - dev-network

    depends_on:
      - django-runtime

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # Loki - Log aggregation
  # ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: ${COMPOSE_PROJECT_NAME:-myproject}-loki
    user: "0"

    profiles:
      - logging

    ports:
      - "3100:3100"

    volumes:
      - ./docker-setup/logging/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki

    command: -config.file=/etc/loki/local-config.yaml

    networks:
      - dev-network

    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # Grafana - Log visualization
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-myproject}-grafana

    profiles:
      - logging

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker-setup/logging/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro

    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false

    networks:
      - dev-network

    depends_on:
      loki:
        condition: service_healthy

networks:
  dev-network:
    driver: bridge

volumes:
  devuser-home:
  postgres-data:
  loki-data:
  grafana-data:
  static-files:
  media-files:
