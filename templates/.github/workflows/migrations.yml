name: Migrations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-migrations-created:
    name: Check migration files are created
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: {app_name}.settings.test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          script/bootstrap
          echo "::endgroup::"

      - name: Check for missing migrations
        run: |
          echo "::group::Checking for missing migration files"
          script/check_migrations
          echo "::endgroup::"

  apply-migrations:
    name: Verify migrations apply cleanly
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: {app_name}.settings.dev
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_ADMIN_USERNAME: ci_admin
      DJANGO_ADMIN_PASSWORD: ci_admin_password
      DATABASE_NAME: ci_test_db
      DATABASE_USERNAME: ci_user
      DATABASE_PASSWORD: ci_password
      DATABASE_URL: localhost
      DATABASE_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          script/bootstrap
          echo "::endgroup::"

      - name: Apply migrations
        run: |
          echo "::group::Applying migrations to PostgreSQL"
          script/migrate
          echo "::endgroup::"
